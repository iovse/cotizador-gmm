<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotización GMM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#e8e8e6;color:#1a1a1a;font-size:11px}
.bar{background:#1A3A5C;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.bar-title{color:#fff;font-size:13px;font-weight:500}
.btns{display:flex;gap:8px}
.btn{padding:6px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;border:none}
.btn-print{background:#fff;color:#1A3A5C}
.btn-close{background:transparent;color:#ccc;border:.5px solid #555 !important;border-radius:7px}
.sec-bar{background:#0f2a45;padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sec-lbl{color:#8aa8c8;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.chip{cursor:pointer;border-radius:6px;padding:3px 10px;font-size:11px;border:none}
.chip.on{background:#2563EB;color:#fff}
.chip.off{background:transparent;color:#8aa8c8;border:.5px solid #3a5a7a}
.page{width:210mm;min-height:277mm;background:#fff;margin:12px auto;padding:13mm;box-shadow:0 2px 12px rgba(0,0,0,.12);display:flex;flex-direction:column}
.page.ls{width:270mm;min-height:207mm}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;padding-bottom:9px;border-bottom:2.5px solid #1A3A5C}
.hdr-logo{font-size:14px;font-weight:700;color:#1A3A5C;height:42px;display:flex;align-items:center}
.hdr-logo img{height:42px;max-width:160px;object-fit:contain}
.hdr-r{text-align:right}
.hdr-title{font-size:14px;font-weight:700;color:#1A3A5C;margin:0 0 2px}
.hdr-sub{font-size:9px;color:#888}
.client-bar{display:flex;background:#f3f6fb;border-radius:7px;margin-bottom:10px;border:.5px solid #d0daea;overflow:hidden}
.cf{flex:1;padding:7px 12px;border-right:.5px solid #d0daea}
.cf:last-child{border-right:none}
.cl{font-size:8.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#8aa8c8;margin-bottom:2px}
.cv{font-size:11px;font-weight:600;color:#1A3A5C}
.sec-title{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#1A3A5C;margin:10px 0 5px;padding-bottom:3px;border-bottom:1.5px solid #1A3A5C}
.pt{width:100%;border-collapse:collapse;margin-bottom:8px}
.pt th{background:#1A3A5C;color:#fff;padding:5px 9px;font-size:9px;font-weight:600;text-align:left}
.pt th.r{text-align:right}
.pt td{padding:7px 9px;border-bottom:.5px solid #ebebea;vertical-align:top}
.pt tr:last-child td{border-bottom:none}
.plan-co{font-size:8.5px;color:#999;display:block;text-transform:uppercase;letter-spacing:.03em}
.plan-name{font-size:11px;font-weight:600;color:#1A3A5C}
.plan-ded{font-size:9px;color:#666;display:block;margin-top:1px}
.badge{display:inline-block;background:#0F6E56;color:#fff;font-size:7.5px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:6px;vertical-align:middle}
.warn-mat{display:block;background:#fffbeb;color:#92400e;font-size:8px;padding:2px 5px;border-radius:3px;margin-top:2px;border:.5px solid #fde68a}
.px-mxn{font-size:13px;font-weight:700;display:block;text-align:right;line-height:1.2}
.px-mxn.best{color:#0F6E56}
.px-usd{font-size:9px;font-weight:300;color:#bbb;display:block;text-align:right;margin-top:1px}
.px-base{font-size:10px;color:#555;display:block;text-align:right}
.px-ext{font-size:8px;color:#999;display:block;text-align:right;margin-top:1px;line-height:1.4}
.mb-tr td{padding:0 9px 7px;border-bottom:.5px solid #ebebea}
.mb-wrap{background:#f7f9fc;border:.5px solid #e2e9f3;border-radius:5px;padding:5px 9px}
.mb-title{display:block;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#8aa8c8;margin-bottom:3px}
.mb-row{display:flex;justify-content:space-between;align-items:baseline;font-size:8.5px;padding:1.5px 0;border-bottom:.5px dotted #e2e9f3}
.mb-row:last-child{border-bottom:none}
.mb-role{color:#1A3A5C;font-weight:600}
.mb-val{color:#444;font-weight:600;white-space:nowrap}
.mb-x{color:#999;font-weight:400}
.nota{background:#fffbeb;border:.5px solid #fde68a;border-radius:5px;padding:5px 9px;font-size:8px;color:#92400e;margin:7px 0}
.ct{width:100%;border-collapse:collapse;font-size:9px}
.ct th{background:#1A3A5C;color:#fff;padding:4px 7px;font-size:8.5px;font-weight:600}
.ct th.cl2{text-align:left;min-width:110px}
.ct th.ph{text-align:center;min-width:75px;padding:5px 6px;line-height:1.25}
.ct th.ph .ph-name{display:block;font-size:8.5px;font-weight:600}
.ct th.ph .ph-px{display:block;font-size:9.5px;font-weight:700;margin-top:2px;color:#fff}
.ct th.ph .ph-best{display:inline-block;background:#0F6E56;color:#fff;font-size:7px;font-weight:700;padding:0 4px;border-radius:8px;margin-top:2px;letter-spacing:.03em}
.ct th.ph .ph-usd{display:block;font-size:7.5px;font-weight:400;opacity:.85;margin-top:1px}
.ct th.ph .ph-ded{display:block;font-size:7px;font-weight:400;opacity:.8;margin-top:1px}
.ct td{padding:3px 7px;border-bottom:.5px solid #ebebea;vertical-align:middle}
.ct td.best-cov{background:#e1f5ee!important;box-shadow:inset 0 0 0 1.2px #0F6E56}
.ct .cov-star{color:#0F6E56;font-size:7px;vertical-align:super}
.ct td.cob{text-align:left;color:#333;font-size:8.5px}
.ct td.val{text-align:center;font-size:9px}
.ct tr.sr td{background:#1A3A5C;color:#fff;font-weight:700;font-size:8px;letter-spacing:.07em;text-transform:uppercase}
.ct tr.even td{background:#f9f9f8}
.ct tr.even td.cob{background:#fafaf9}
.vi{color:#0F6E56;font-weight:600}
.vx{color:#c0392b}
.vl{color:#854F0B}
.ve{color:#ccc;font-size:8px}
.foot{margin-top:auto;padding-top:8px;border-top:.5px solid #d4d4d0;display:flex;justify-content:space-between;align-items:flex-end;font-size:8.5px;color:#888}
.foot strong{display:block;font-size:9.5px;color:#1A3A5C;font-weight:700;margin-bottom:2px}
@media print{
  .bar,.sec-bar{display:none!important}
  .page{margin:0;box-shadow:none;page-break-after:always}
  .page:last-child{page-break-after:auto}
  @page{margin:8mm;size:letter portrait}
  @page landscape{margin:8mm;size:letter landscape}
  /* Force background colors in PDF */
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  .ct tr.sr td{background:#1A3A5C!important;color:#fff!important}
  .hdr{border-bottom-color:#1A3A5C!important}
  .sec-title{border-bottom-color:#1A3A5C!important;color:#1A3A5C!important}
  .ct th{background:#1A3A5C!important;color:#fff!important}
  .pt th{background:#1A3A5C!important;color:#fff!important}
  .client-bar{background:#f3f6fb!important;border-color:#d0daea!important}
  .badge{background:#0F6E56!important;color:#fff!important}
  .nota{background:#fffbeb!important;border-color:#fde68a!important}
  .page.ls{page:landscape}
}
</style>
</head>
<body>

<div class="bar">
  <span class="bar-title" id="bar-title">Cotización GMM</span>
  <div class="btns">
    <button class="btn btn-close" onclick="window.close()">✕ Cerrar</button>
    <button class="btn btn-print" onclick="window.print()">🖨 Imprimir / PDF</button>
  </div>
</div>

<div class="sec-bar" id="sec-bar" style="display:none">
  <span class="sec-lbl">Secciones:</span>
  <div id="chips"></div>
</div>

<div id="pages"></div>

<script>
const raw = sessionStorage.getItem('gmm_print');
if(!raw){document.getElementById('pages').innerHTML='<p style="padding:2rem;color:#888;text-align:center">No hay datos de cotización. Abre esta página desde el cotizador.</p>';}
else{
  const D = JSON.parse(raw);
  const isLS = D.results.length > 3;

  // Inject correct @page orientation for PDF
  const printStyleEl = document.createElement('style');
  printStyleEl.id = 'dynamic-print-style';
  printStyleEl.textContent = isLS
    ? '@media print{@page{margin:8mm;size:letter landscape}.page{width:270mm;min-height:207mm}}'
    : '@media print{@page{margin:8mm;size:letter portrait}.page{width:210mm;min-height:277mm}}';
  document.head.appendChild(printStyleEl);
  const planKeys = D.results.map(r=>r.k);
  // Planes "Sin EE.UU." (BMI-AZU-M/I1M-M/I3M-M): no tienen columna propia en
  // COBERTURAS por diseno, reutilizan la del plan base via alias.
  const SIN_EEUU_PLANES = ['BMI-AZU-M','BMI-I1M-M','BMI-I3M-M'];
  const NAC_COVERAGE_ALIAS = {'BMI-AZU-M':'BMI-AZU','BMI-I1M-M':'BMI-I1M','BMI-I3M-M':'BMI-I3M'};
  function isUSANetworkRow(label){ return /usa/i.test(label||''); }
  function isZonaCoberturaRow(label){ return /zona\s+de\s+cobertura/i.test(label||''); }
  const covKeys = D.coberturas&&D.coberturas.planKeys
    ? planKeys.filter(k=>{ const lk=NAC_COVERAGE_ALIAS[k]||k; return D.coberturas.planKeys.includes(lk); })
    : [...new Set(planKeys)];
  // comboCols: una columna por cada combinacion plan+deducible presente en D.results
  // (matriz plan x deducible). Las coberturas cualitativas se leen por r.k (se repiten
  // entre columnas del mismo plan); precio y deducible si difieren por columna.
  const comboCols = D.results.filter(r=>covKeys.includes(r.k));
  const allSecs = D.coberturas&&D.coberturas.secOrder ? D.coberturas.secOrder : [];
  let selSecs = new Set(allSecs);

  const PCOL = {'RB-ULTRA':'#0F6E56','RB-PRIME':'#185FA5','RB-MAX':'#185FA5','RB-SPEC':'#854F0B',
    'BMI-MER':'#185FA5','BMI-MER-PLUS':'#534AB7','BMI-AZU':'#1D9E75','BMI-I3M':'#854F0B','BMI-I1M':'#854F0B',
    'BD-ELITE':'#534AB7','BD-PREM':'#0F6E56','BD-GLOBAL':'#185FA5','BD-SEL':'#993556',
    'SUREGO-PROT':'#1A237E','SUREGO-ASS':'#1565C0','SUREGO-CHO':'#00838F',
    'BUPA-ELITE':'#003087','BUPA-PREM':'#003087','BUPA-SEL':'#003087',
    'VUMI-ABS':'#A32D2D','VUMI-UNI':'#185FA5','VUMI-SPEC':'#854F0B'};

  function fM(n){return'$'+Math.round(n).toLocaleString('es-MX')+' MXN';}
  function fU(n){return'USD '+Math.round(n).toLocaleString('es-MX');}
  function sv(v){
    // Celda vacia = el plan no cubre esa prestacion (no 'dato faltante').
    if(!v||String(v).trim()==='')return'\u274c';
    const s=String(v).trim().replace(/^\u2605\s*/,''),lv=s.toLowerCase();
    if(s==='1'||s==='100%')return'\u2705';
    if(lv==='sin cobertura'||s==='0'||s==='0%')return'\u274c';
    if(lv==='incluido'||lv==='incluida')return'<span class="vi">\u2713 Incluido</span>';
    if(lv==='excluido'||lv==='excluida')return'<span class="vx">\u2717 Excluido</span>';
    if(lv.startsWith('límite')||lv.startsWith('limite'))return'<span class="vl">'+s+'</span>';
    // Numero plano grande sin formato (suma asegurada BUPA Nacional sin formatear)
    // -> formatear como monto en pesos mexicanos.
    if(/^\d{4,}$/.test(s))return'$'+Number(s).toLocaleString('es-MX')+' MXN';
    return s;
  }
  // Deteccion de "mejor" valor por renglon (mismo criterio que el cotizador principal)
  function parseCovMagnitude(raw){
    if(raw==null)return null;
    let s=String(raw).trim();
    if(s==='')return null;
    s=s.replace(/^\u2605\s*/,'');
    const lv=s.toLowerCase();
    if(lv==='ilimitado'||lv==='ilimitada'||lv.includes('sin límite')||lv.includes('sin limite'))return Infinity;
    if(lv==='sin cobertura'||lv==='no aplica'||lv==='no incluido'||lv==='no incluida'||lv==='excluido'||lv==='excluida'||s==='0'||s==='0%')return 0;
    let m=s.match(/^(\d+(?:[.,]\d+)?)\s*%$/);
    if(m)return parseFloat(m[1].replace(',','.'));
    if(s==='1'||lv==='incluido'||lv==='incluida')return 1;
    if(/^[A-Z]{0,4}\$?\s*[\d,]+(\.\d+)?\s*[KkM]?$/.test(s)){
      let n=s.replace(/^[A-Z]{0,4}\$?\s*/,'');
      let mult=1;
      if(/[Kk]$/.test(n)){mult=1000;n=n.slice(0,-1);}
      else if(/M$/.test(n)){mult=1000000;n=n.slice(0,-1);}
      const num=parseFloat(n.replace(/,/g,''));
      return isNaN(num)?null:num*mult;
    }
    return null;
  }
  // Resaltado automatico DESACTIVADO (2026-07-10): marcaba "mejor" incorrectamente.
  // Solo queda el criterio manual explicito (star en el Sheet de COBERTURAS).
  function bestValueIndices(label,values){
    const manualIdx=[];
    values.forEach((v,i)=>{if(v!=null&&String(v).trim().startsWith('\u2605'))manualIdx.push(i);});
    return manualIdx;
  }

  function hdr(){
    return'<div class="hdr">'+logoHTML+
      '<div class="hdr-r"><p class="hdr-title">Cotización de Gastos Médicos Mayores</p>'+
      '<p class="hdr-sub">Fecha: '+D.fecha+' · Vigencia de tarifas: 2026</p></div></div>';
  }

  function clientBar(){
    const hi = D.asegurados.hijos&&D.asegurados.hijos.length
      ? D.asegurados.hijos.map((a,i)=>'H'+(i+1)+': '+a+' años').join(' · ') : null;
    const flds = [{l:'Cliente',v:D.cliente},{l:'Titular',v:D.asegurados.titular+' años'},
      ...(D.asegurados.conyuge?[{l:'Cónyuge',v:D.asegurados.conyuge+' años'}]:[]),
      ...(hi?[{l:'Hijos',v:hi}]:[]),
      {l:'Nivel',v:D.nivel},{l:'Deducible',v:(D.compareDeds&&D.compareDeds.length>1)
        ? ('Comparando '+D.compareDeds.length+' opciones')
        : ('USD $'+(D.deducible!=null?D.deducible:(D.compareDeds?D.compareDeds[0]:0)).toLocaleString('es-MX'))}];
    return'<div class="client-bar">'+flds.map(f=>
      '<div class="cf"><div class="cl">'+f.l+'</div><div class="cv">'+f.v+'</div></div>'
    ).join('')+'</div>';
  }

  function foot(pg,tot){
    return'<div class="foot"><div><strong>'+D.contacto.nombre+'</strong><span>'+D.contacto.email+'</span></div>'+
      '<div style="text-align:right">Página '+pg+' de '+tot+' · TC FIX: $'+D.fx.toFixed(2)+' MXN/USD</div></div>';
  }

  const PS = 'page'+(isLS?' ls':'');
  const hasCov = allSecs.length>0 && covKeys.length>0;
  const totalPg = hasCov ? 2 : 1;

  // ── Page 1: Primas ────────────────────────────────────────────────────
  function buildPage1(){
    const sorted = [...D.results].sort((a,b)=>a.totalMXN-b.totalMXN);
    let rows = '';
    sorted.forEach((r,i)=>{
      const best = i===0;
      const mxn = fM(r.totalMXN||0);
      const usd = r.isMXN ? (D.fx?fU((r.totalMXN||0)/D.fx):'') : (r.annual?fU(r.annual):'');
      // Desglose de prima por integrante — en la moneda nativa del plan (USD o MXN)
      let memHTML='';
      if(r.members&&r.members.length){
        const fmt = r.isMXN ? fM : fU;
        const items=r.members.map(m=>{
          const extras=[];
          if(m.acc>0)extras.push('end. acc. '+fU(m.acc));
          if(m.endoso>0)extras.push('end. Plus '+fU(m.endoso));
          const ageTxt=(typeof m.age==='number')?(' · '+m.age+' años'):'';
          return '<div class="mb-row"><span class="mb-role">'+m.role+ageTxt+'</span>'+
                 '<span class="mb-val">'+fmt(m.base)+(extras.length?' <span class="mb-x">+ '+extras.join(' + ')+'</span>':'')+'</span></div>';
        }).join('');
        memHTML='<tr class="mb-tr" style="background:'+(best?'#f0faf5':(i%2?'#fafaf9':'#fff'))+'">'+
          '<td colspan="2"><div class="mb-wrap"><span class="mb-title">Desglose de prima por integrante</span>'+items+'</div></td></tr>';
      }
      rows += '<tr style="background:'+(best?'#f0faf5':(i%2?'#fafaf9':'#fff'))+'">'+
        '<td><span class="plan-co">'+r.compania+'</span>'+
        '<span class="plan-name">'+r.nombre+(best?'<span class="badge">✓ Mejor precio</span>':'')+'</span>'+
        '<span class="plan-ded">Deducible: '+r.ded+'</span>'+
        (r.matWarn?'<span class="warn-mat">⚠ '+r.matWarn+'</span>':'')+
        '</td>'+
        '<td><span class="px-mxn'+(best?' best':'')+'">'+mxn+'</span>'+
        (usd?'<span class="px-usd">'+usd+'</span>':'')+
        '</td></tr>'+memHTML;
    });

    return '<div class="'+PS+'">'+hdr()+clientBar()+
      '<div class="sec-title">Planes cotizados</div>'+
      '<table class="pt"><thead><tr>'+
      '<th style="width:62%">Plan / Compañía</th>'+
      '<th class="r" style="width:38%">Prima total anual ↓</th>'+
      '</tr></thead><tbody>'+rows+'</tbody></table>'+
      '<div class="nota">Primas en pesos con TC FIX Banxico ($'+D.fx.toFixed(2)+' MXN/USD). Planes BUPA y SUREGO incluyen emisión e IVA 16%. Para planes en USD el equivalente MXN es referencial.</div>'+
      foot(1,totalPg)+'</div>';
  }

  // ── Page 2: Coberturas ────────────────────────────────────────────────
  // Planes BMI "Sin EE.UU." (Nacional): reutilizan las coberturas de sus
  // contrapartes internacionales en el Sheet, pero no incluyen red en EE.UU.
  // Se fuerza X roja en ese renglon especifico, sin tocar el Google Sheet.
  function buildPage2(secsArr){
    if(!hasCov||!secsArr.length){
      return'<div class="'+PS+'">'+hdr()+clientBar()+
        '<div class="sec-title">Comparativo de coberturas</div>'+
        '<p style="font-size:10px;color:#888;padding:2rem;text-align:center">Selecciona secciones arriba o captura coberturas en Google Sheets.</p>'+
        foot(2,totalPg)+'</div>';
    }
    // Agrupar columnas por plan (varias columnas = varios deducibles del mismo plan)
    // para no repetir el desglose de coberturas por cada deducible.
    const groups = [];
    const groupIdx = {};
    comboCols.forEach(r=>{
      if(!(r.k in groupIdx)){ groupIdx[r.k]=groups.length; groups.push({k:r.k, nombre:r.nombre, items:[]}); }
      groups[groupIdx[r.k]].items.push(r);
    });
    // identify best (lowest total MXN) among the plan+deducible columns shown
    const minTotal = comboCols.length ? Math.min(...comboCols.map(r=>r.totalMXN||Infinity)) : Infinity;
    const planNameRow = groups.map(g=>{
      const c = PCOL[g.k]||'#1A3A5C';
      return '<th class="ph" colspan="'+g.items.length+'" style="background:'+c+'"><span class="ph-name">'+g.nombre+'</span></th>';
    }).join('');
    const dedPriceRow = groups.map(g=>{
      const c = PCOL[g.k]||'#1A3A5C';
      return g.items.map(r=>{
        let inner = '<span class="ph-ded">Ded. '+r.ded+'</span>';
        if(r.totalMXN){
          const isBest = r.totalMXN===minTotal;
          inner += '<span class="ph-px">'+fM(r.totalMXN)+'</span>';
          const usd = r.isMXN ? (D.fx?fU(r.totalMXN/D.fx):'') : (r.annual?fU(r.annual):'');
          if(usd) inner += '<span class="ph-usd">'+usd+'</span>';
          if(isBest) inner += '<span class="ph-best">\u2713 Mejor precio</span>';
        }
        return '<th class="ph" style="background:'+c+'">'+inner+'</th>';
      }).join('');
    }).join('');

    let rows = '';
    secsArr.forEach(sec=>{
      const sr = (D.coberturas.sections[sec]||[]);
      if(!sr.length) return;
      rows += '<tr class="sr"><td colspan="'+(comboCols.length+1)+'">'+sec+'</td></tr>';
      sr.forEach((row,ri)=>{
        const e = ri%2===1;
        const isUSARow = isUSANetworkRow(row.cob);
        const isZonaRow = isZonaCoberturaRow(row.cob);
        const groupVals = groups.map(g=>{
          const lookupKey = NAC_COVERAGE_ALIAS[g.k]||g.k;
          let v = row.vals[lookupKey]||'';
          if(isUSARow && SIN_EEUU_PLANES.includes(g.k)) v='Sin cobertura';
          else if(isZonaRow && SIN_EEUU_PLANES.includes(g.k)) v='NACIONAL';
          return v;
        });
        const bestIdx = bestValueIndices(row.cob, groupVals);
        const cells = groups.map((g,i)=>{
          const isBest = bestIdx.includes(i);
          return '<td colspan="'+g.items.length+'" class="val'+(e?' even':'')+(isBest?' best-cov':'')+'">'+sv(groupVals[i])+(isBest?' <span class="cov-star">\u2605</span>':'')+'</td>';
        }).join('');
        rows += '<tr'+(e?' class="even"':'')+'><td class="cob'+(e?' even':'')+'">'+row.cob+'</td>'+cells+'</tr>';
      });
    });

    return'<div class="'+PS+'">'+hdr()+clientBar()+
      '<div class="sec-title">Comparativo de coberturas — '+secsArr.join(' · ')+'</div>'+
      '<table class="ct"><thead><tr><th class="cl2" rowspan="2">Cobertura</th>'+planNameRow+'</tr><tr>'+dedPriceRow+'</tr></thead>'+
      '<tbody>'+rows+'</tbody></table>'+
      foot(2,totalPg)+'</div>';
  }

  // ── Section chips ──────────────────────────────────────────────────────
  function buildChips(){
    const wrap = document.getElementById('chips');
    wrap.innerHTML = '';
    allSecs.forEach(sec=>{
      const on = selSecs.has(sec);
      const b = document.createElement('button');
      b.className = 'chip '+(on?'on':'off');
      b.textContent = sec;
      b.onclick = ()=>{
        if(selSecs.has(sec)) selSecs.delete(sec); else selSecs.add(sec);
        b.className = 'chip '+(selSecs.has(sec)?'on':'off');
        refreshPage2();
      };
      wrap.appendChild(b);
    });
  }

  function refreshPage2(){
    const sa = allSecs.filter(s=>selSecs.has(s)&&D.coberturas.sections[s]&&D.coberturas.sections[s].length);
    const pages = document.getElementById('pages');
    const p2 = pages.children[1];
    const newP2 = document.createElement('div');
    newP2.innerHTML = buildPage2(sa);
    if(p2) pages.replaceChild(newP2.firstChild, p2);
    else pages.appendChild(newP2.firstChild);
  }

  // ── Render ────────────────────────────────────────────────────────────
  document.getElementById('bar-title').textContent = D.cliente+' · '+D.fecha;

  const pages = document.getElementById('pages');
  const p1 = document.createElement('div');
  p1.innerHTML = buildPage1();
  pages.appendChild(p1.firstChild);

  if(hasCov){
    document.getElementById('sec-bar').style.display = 'flex';
    buildChips();
    const sa = allSecs.filter(s=>D.coberturas.sections[s]&&D.coberturas.sections[s].length);
    const p2 = document.createElement('div');
    p2.innerHTML = buildPage2(sa);
    pages.appendChild(p2.firstChild);
  }
}
</script>
</body>
</html>
